<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Receipt Preview - {{ vehicle_number }}</title>
    <style>
        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            padding: 2rem;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .card {
            background-color: white;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 450px;
            padding: 2.5rem;
            border: 1px solid #e1e7e4;
        }
        .header {
            text-align: center;
            margin-bottom: 2rem;
        }
        .header h1 {
            font-size: 1.5rem;
            color: #1a202c;
            margin: 0;
        }
        .header p {
            color: #718096;
            font-size: 0.875rem;
            margin-top: 0.25rem;
        }
        .details {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
            margin-bottom: 2rem;
        }
        .detail-item label {
            display: block;
            font-size: 0.75rem;
            color: #a0aec0;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.25rem;
        }
        .detail-item span {
            display: block;
            font-size: 1.125rem;
            font-weight: 600;
            color: #2d3748;
        }
        .net-weight {
            background-color: #f0fff4;
            color: #22543d;
            padding: 1rem;
            border-radius: 8px;
            text-align: center;
            margin-bottom: 2rem;
            border: 1px solid #c6f6d5;
        }
        .net-weight label {
            font-size: 0.875rem;
            font-weight: 500;
        }
        .net-weight span {
            display: block;
            font-size: 2rem;
            font-weight: 700;
        }
        .actions {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        .btn {
            display: block;
            width: 100%;
            padding: 0.875rem;
            border-radius: 8px;
            text-align: center;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.2s ease;
            cursor: pointer;
            box-sizing: border-box;
        }
        .btn-primary {
            background-color: #3182ce;
            color: white;
            border: none;
        }
        .btn-primary:hover {
            background-color: #2b6cb0;
        }
        .btn-outline {
            background-color: transparent;
            color: #4a5568;
            border: 1px solid #cbd5e0;
        }
        .btn-outline:hover {
            background-color: #f7fafc;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="header">
            <p>WEIGHBRIDGE RECEIPT</p>
            <h1>#{{ receipt.id }}</h1>
        </div>

        <div class="details">
            <div class="detail-item">
                <label>Vehicle Number</label>
                <span>{{ vehicle_number or 'N/A' }}</span>
            </div>
            <div class="detail-item">
                <label>Date</label>
                <span>{{ receipt.date_time.strftime('%b %d, %Y') }}</span>
            </div>
            <div class="detail-item">
                <label>Gross Weight</label>
                <span>{{ receipt.gross_weight }} kg</span>
            </div>
            <div class="detail-item">
                <label>Tare Weight</label>
                <span>{{ receipt.tare_weight }} kg</span>
            </div>
        </div>

        <div class="net-weight">
            <label>NET WEIGHT</label>
            <span>{{ receipt.gross_weight - receipt.tare_weight }} kg</span>
        </div>

        <div class="actions">
            <a href="/receipts/{{ receipt.share_token }}/pdf" class="btn btn-primary">View / Download PDF</a>
            <button onclick="window.print()" class="btn btn-outline">Print Details</button>
        </div>
    </div>
</body>
</html>
